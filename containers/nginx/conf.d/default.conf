# テスト環境用 nginx 設定（HTTP のみ・HTTPS 不使用）
# vas と同一ドメインの /acmg サブパス配下で提供する。

limit_req_zone $binary_remote_addr zone=acmg_api_limit:10m rate=3r/s;

upstream acmg_app {
    server app:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/nginx/acmg_access.log;
    error_log  /var/log/nginx/acmg_error.log warn;

    # セキュリティヘッダ（テスト環境でも付与）
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静的ファイル
    location /acmg/static/ {
        alias /static/;
    }

    # REST API（トークン認証・レート制限）
    location /acmg/api/ {
        limit_req zone=acmg_api_limit burst=10 nodelay;
        client_max_body_size 50m;

        # /acmg/ を除去して app へ渡す（FORCE_SCRIPT_NAME=/acmg で URL は復元される）
        proxy_pass http://acmg_app/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 900s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # アプリ本体
    location /acmg/ {
        client_max_body_size 50m;

        proxy_pass http://acmg_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 900s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
