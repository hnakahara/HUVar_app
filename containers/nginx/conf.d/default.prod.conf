# 本番環境用 nginx 設定（HTTPS）
# vas と同一ドメインの /acmg サブパス配下で提供する。全世界公開・認証で防御。

limit_req_zone $binary_remote_addr zone=acmg_api_limit:10m rate=3r/s;

upstream acmg_app {
    server app:8000;
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name 1603-027.a.hiroshima-u.ac.jp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 1603-027.a.hiroshima-u.ac.jp;

    ssl_certificate     /etc/pki/nginx/server.crt;
    ssl_certificate_key /etc/pki/nginx/private/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # セキュリティヘッダ
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    access_log /var/log/nginx/acmg_access.log;
    error_log  /var/log/nginx/acmg_error.log warn;

    location /acmg/static/ {
        alias /static/;
    }

    location /acmg/api/ {
        limit_req zone=acmg_api_limit burst=10 nodelay;
        client_max_body_size 50m;

        proxy_pass http://acmg_app/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 900s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location /acmg/ {
        client_max_body_size 50m;

        proxy_pass http://acmg_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 900s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
