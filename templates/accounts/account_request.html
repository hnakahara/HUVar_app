{% extends "base.html" %}
{% load i18n %}
{% block title %}{% translate "アカウント発行リクエスト" %} | HUVar{% endblock %}
{% block content %}
<h1>{% translate "アカウント発行リクエスト" %}</h1>
<p>{% translate "新規ユーザーは自己登録できません。以下を送信し、管理者の承認をお待ちください。" %}</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% translate "リクエスト送信" %}</button>
</form>
<p><a href="{% url 'accounts:login' %}">{% translate "ログインへ戻る" %}</a></p>
{% endblock %}
