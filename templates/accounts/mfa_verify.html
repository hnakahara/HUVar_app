{% extends "base.html" %}
{% block title %}MFA 認証 | HUVar{% endblock %}
{% block content %}
<h1>多要素認証</h1>
<p>認証アプリに表示されている 6 桁コードを入力してください。</p>
<form method="post">
    {% csrf_token %}
    <label>認証コード（6桁）: <input type="text" name="token" inputmode="numeric"
        autocomplete="one-time-code" required autofocus></label>
    <button type="submit">認証</button>
</form>
<p><a href="{% url 'accounts:logout' %}">ログアウト</a></p>
{% endblock %}
