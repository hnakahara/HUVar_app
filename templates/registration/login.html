{% extends "base.html" %}
{% block title %}ログイン | HUHVar{% endblock %}
{% block content %}
<h1>ログイン</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">ログイン</button>
</form>
<p>アカウントをお持ちでない方は
    <a href="{% url 'accounts:account_request' %}">アカウント発行リクエスト</a>
    （自己登録はできません。管理者が承認します）。</p>
{% endblock %}
